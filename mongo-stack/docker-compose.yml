services:
  mongo:
    image: mongo:7
    container_name: shared-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - shared-mongo-data:/data/db
    networks:
      - shared-mongo-net
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - -u
        - ${MONGO_ROOT_USER}
        - -p
        - ${MONGO_ROOT_PASSWORD}
        - --authenticationDatabase
        - admin
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  shared-mongo-net:
    name: shared-mongo-net
    driver: bridge

volumes:
  shared-mongo-data:
    name: shared-mongo-data
