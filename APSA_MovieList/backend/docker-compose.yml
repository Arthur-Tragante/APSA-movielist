version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moicanos-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_ENABLED=true
      - MONGODB_URI=mongodb://mongo:27017/apsa-movielist
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moicanos-network
    volumes:
      - ./logs:/app/logs

  # MongoDB
  mongo:
    image: mongo:7
    container_name: moicanos-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=apsa-movielist
    volumes:
      - mongo-data:/data/db
    networks:
      - moicanos-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache
  redis:
    image: redis:7-alpine
    container_name: moicanos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - moicanos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  moicanos-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
